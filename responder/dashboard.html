<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responder Dashboard - NightReach</title>

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}

body{
background:#0f172a;
color:#e5e7eb;
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#020617;
border-right:1px solid #1f2937;
padding:30px 20px;
position:fixed;
height:100%;
}

.logo{
font-size:20px;
font-weight:600;
margin-bottom:35px;
}

.sidebar a{
display:block;
text-decoration:none;
color:#9ca3af;
padding:10px 0;
font-size:14px;
}

.sidebar a:hover{
color:white;
}

/* MAIN */

.main{
margin-left:220px;
flex:1;
padding:40px;
max-width:1200px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
font-size:26px;
}

.profile{
background:#111827;
padding:8px 14px;
border-radius:6px;
font-size:14px;
cursor:pointer;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:#111827;
padding:20px;
border-radius:8px;
box-shadow:0 4px 14px rgba(0,0,0,0.25);
}

.stat-title{
font-size:13px;
color:#9ca3af;
margin-bottom:6px;
}

.stat-value{
font-size:22px;
font-weight:600;
}

/* ACTIVE JOB */

.active-job{
background:#1f2937;
padding:22px;
border-radius:8px;
margin-bottom:35px;
}

.active-title{
font-size:18px;
margin-bottom:12px;
}

.complete-btn{
margin-top:12px;
background:#16a34a;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* REQUEST GRID */

.section-title{
font-size:18px;
margin-bottom:18px;
}

.request-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:22px;
}

.request-card{
background:#111827;
border-radius:8px;
padding:22px;
box-shadow:0 4px 14px rgba(0,0,0,0.25);
}

.request-title{
font-size:16px;
font-weight:600;
margin-bottom:10px;
}

.meta{
font-size:14px;
color:#9ca3af;
margin-bottom:4px;
}

.actions{
margin-top:14px;
}

.accept-btn{
background:#2563eb;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.accept-btn:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">NightReach</div>

<a href="#">Dashboard</a>
<a href="#">My Requests</a>
<a href="../login.html">Logout</a>

</div>


<!-- MAIN -->

<div class="main">

<div class="header">

<h1>Responder Dashboard</h1>

<div class="profile">
Vinay ⭐4.8
</div>

</div>


<!-- STATS -->

<div class="stats">

<div class="stat-card">
<div class="stat-title">Rating</div>
<div class="stat-value">⭐ 4.8</div>
</div>

<div class="stat-card">
<div class="stat-title">Completed Jobs</div>
<div class="stat-value">21</div>
</div>

<div class="stat-card">
<div class="stat-title">Active Requests</div>
<div class="stat-value">1</div>
</div>

</div>


<!-- ACTIVE JOB -->

<div class="active-job">

<div class="active-title">Active Job</div>

<div class="meta">Vehicle Breakdown</div>
<div class="meta">📍 Kowdiar</div>
<div class="meta">🕒 Accepted at 11:45 PM</div>

<button class="complete-btn">Mark Completed</button>

</div>


<!-- AVAILABLE REQUESTS -->

<div class="section-title">Available Requests</div>

<div class="request-grid">

<div class="request-card">

<div class="request-title">Medical Assistance</div>

<div class="meta">📍 Kazhakootam</div>
<div class="meta">🕒 11:30 PM</div>

<div class="actions">
<button class="accept-btn">Accept Request</button>
</div>

</div>

<div class="request-card">

<div class="request-title">Safety Concern</div>

<div class="meta">📍 Pattom</div>
<div class="meta">🕒 10:55 PM</div>

<div class="actions">
<button class="accept-btn">Accept Request</button>
</div>

</div>

</div>

</div>

</body>
</html>
